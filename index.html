<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XAN Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d98a;
      --gold-dark: #9a7a2e;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Noto Sans Arabic', sans-serif;
      background: #080808;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: blobIn 1.8s ease forwards;
    }
    .blob-1 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #c9a84c55, transparent 70%);
      top: -150px; left: -100px;
      animation-delay: 0.2s;
    }
    .blob-2 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, #7b4fff44, transparent 70%);
      bottom: -120px; right: -80px;
      animation-delay: 0.4s;
    }
    .blob-3 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, #ff6b6b33, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 0.6s;
    }
    @keyframes blobIn {
      to { opacity: 1; }
    }

    /* Main layout */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: clamp(1.5rem, 5vw, 3rem) clamp(1.2rem, 5vw, 2rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1.4rem, 3.5vw, 2rem);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Brand */
    .brand { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }

    .brand-logo {
      font-size: clamp(2.6rem, 10vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold-light) 45%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .brand-welcome {
      font-size: clamp(1.05rem, 3.5vw, 1.3rem);
      font-weight: 400;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.02em;
    }

    .brand-slogan {
      font-size: clamp(0.72rem, 2.5vw, 0.85rem);
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.06em;
      opacity: 0.85;
    }

    /* Ornament divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      max-width: 220px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5));
    }
    .divider-line:first-child {
      background: linear-gradient(270deg, transparent, rgba(201,168,76,0.5));
    }
    .divider-diamond {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* Social section label */
    .socials-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    /* Social cards grid */
    .socials {
      display: flex;
      gap: clamp(0.7rem, 2.5vw, 1rem);
      flex-wrap: nowrap;
      justify-content: center;
      width: 100%;
    }

    .card {
      flex: 1;
      max-width: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: clamp(0.85rem, 2.5vw, 1.1rem) 0.8rem;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .card:hover, .card:focus-visible {
      transform: translateY(-6px) scale(1.04);
      background: rgba(255,255,255,0.09);
    }
    .card:active {
      transform: scale(0.97);
      transition-duration: 0.1s;
    }

    .card-icon {
      width: clamp(26px, 6vw, 32px);
      height: clamp(26px, 6vw, 32px);
      display: flex; align-items: center; justify-content: center;
    }
    .card-icon svg {
      width: 100%; height: 100%;
    }

    .card-name {
      font-size: clamp(0.65rem, 2vw, 0.76rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .card-handle {
      font-size: clamp(0.58rem, 1.8vw, 0.67rem);
      font-weight: 300;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.03em;
      direction: ltr;
      text-align: center;
    }

    /* Platform colors */
    .card.instagram { --accent: #e1306c; }
    .card.tiktok    { --accent: #69c9d0; }
    .card.facebook  { --accent: #1877f2; }

    .card:hover {
      border-color: color-mix(in srgb, var(--accent) 50%, transparent);
      box-shadow: 0 14px 36px color-mix(in srgb, var(--accent) 22%, transparent);
    }
    .card svg { color: var(--accent); }

    /* Icon pill glow */
    .card-icon {
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border-radius: 12px;
      padding: 0.4rem;
    }

    /* Footer */
    .footer {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }

    /* Staggered card animation */
    .card { animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .card:nth-child(1) { animation-delay: 0.5s; }
    .card:nth-child(2) { animation-delay: 0.65s; }
    .card:nth-child(3) { animation-delay: 0.8s; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Responsive: very small screens */
    @media (max-width: 360px) {
      .socials { gap: 0.5rem; }
      .card { border-radius: 14px; }
      .card-handle { display: none; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">

    <div class="brand">
      <div class="brand-logo">XAN</div>
      <div class="brand-welcome">بەخێربێن بۆ خان کۆلێکشن</div>
      <div class="brand-slogan">ستایلی ئەمرۆ &mdash; کوالێتی ئەبەدی</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="socials-label">بەدواماندا بگەڕێ</div>

    <div class="socials">


      <!-- Facebook -->
      <a class="card facebook" href="https://www.facebook.com/share/17GoWNgrgg/" target="_blank" rel="noopener noreferrer"
        aria-label="Facebook">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z" />
          </svg>
        </div>
        <span class="card-name">Facebook</span>
        <span class="card-handle">XAN Collection</span>
      </a>


      

      <!-- TikTok -->
      <a class="card tiktok"
         href="https://www.tiktok.com/@xan.collection"
         target="_blank" rel="noopener noreferrer"
         aria-label="TikTok">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88
                     2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01
                     a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34
                     6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/>
          </svg>
        </div>
        <span class="card-name">TikTok</span>
        <span class="card-handle">@xan.collection</span>
      </a>

      <!-- Instagram -->
      <a class="card instagram" href="https://www.instagram.com/xan__collection" target="_blank" rel="noopener noreferrer"
        aria-label="Instagram">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
            <circle cx="12" cy="12" r="4" />
            <circle cx="17.5" cy="6.5" r="0.6" fill="currentColor" stroke="none" />
          </svg>
        </div>
        <span class="card-name">Instagram</span>
        <span class="card-handle">@xan__collection</span>
      </a>

    </div>

    <div class="footer">© 2026 XAN Collection &nbsp;·&nbsp; All rights reserved</div>

  </div>
</body>
</html>
